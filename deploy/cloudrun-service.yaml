apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: hairmatch-live
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "4"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 20
      timeoutSeconds: 60
      containers:
        - image: gcr.io/PROJECT_ID/hairmatch-live
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: GCP_PROJECT
              value: PROJECT_ID
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 20
            failureThreshold: 3
